spring.application.name=backend
server.port=8080




# Supabase PostgreSQL datasource — Transaction Pooler (port 6543)
# prepareThreshold=0 disables prepared statements (required for PgBouncer transaction mode)
spring.datasource.url=jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.eflvdsfxbtwintisqpei
spring.datasource.password=${DB_PASSWORD:pX93%ebCSZc2Xi-}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# HikariCP connection pool settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


